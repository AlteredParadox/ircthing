# Build the multi-arch Docker image and publish it to GitHub Container
# Registry (GHCR) on every version tag.
#
# Trigger: pushing a `vX.Y.Z` tag (the existing release flow). The image is
# published as ghcr.io/alteredparadox/ircthing with tags {X.Y.Z, X.Y, latest}.
# A manual `workflow_dispatch` run builds both arches WITHOUT registry access
# — a cheap "does it still build" check. Both paths gate on `make check`.
#
# Least privilege: only the tag-only `publish` job gets packages: write and
# logs in to the registry; the manual `build` job has read-only permissions
# and never authenticates.
#
# Actions are pinned to full commit SHAs (mutable tags can be repointed at
# malicious code); the trailing comment records the tag each SHA was. Bump via
# Dependabot or by re-resolving the tag.
#
# First-run note: a freshly created GHCR package is PRIVATE. To let others pull
# it, open the package on GitHub → Package settings → change visibility to
# Public (and, optionally, link it to this repo). Nothing here can flip that.

name: docker-release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Quality gate: the same `make check` required before any task is "done"
  # (go vet, staticcheck, tests, frontend build, size gates). A broken tree
  # must never publish an image.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'   # latest 1.25.x ≥ the go.mod toolchain floor
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: make check
        run: make check

  # Manual dispatch only: prove the multi-arch image still builds, WITHOUT any
  # registry access (read-only permissions, no login, no push).
  build:
    if: github.ref_type != 'tag'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            REVISION=${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Tag only: build and publish. This is the ONLY job granted packages: write.
  publish:
    if: github.ref_type == 'tag'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      # Stamp the same version string the native release binaries use: the tag
      # (vX.Y.Z). Passed through env, not direct ${{ }} interpolation into the
      # shell, so a crafted ref name cannot inject commands.
      - name: Resolve version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=$REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image tags/labels. `type=semver` strips the leading v (0.2.4, 0.2) and,
      # via the default latest=auto flavor, also tags `latest` for a non-
      # prerelease version tag. OCI labels (incl. image.revision = the commit)
      # link the package back to this repo.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/alteredparadox/ircthing
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            REVISION=${{ github.sha }}
          # Supply-chain attestations on the published image.
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
