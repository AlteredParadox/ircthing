# SonarQube scan on every push. SONAR_TOKEN and SONAR_HOST_URL are
# repository secrets. Assumes the runner offers the ubuntu-latest label
# and can fetch actions from github.com (act_runner defaults).
name: sonarqube

on:
  push:

# Least privilege: read-only. This job hands SONAR_TOKEN to a third-party
# action, so pinning that action (and the others) to a full commit SHA is
# especially advisable before trusting it — see the NOTE below.
permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      # NOTE: pin these to full commit SHAs (esp. sonarqube-scan-action, which
      # receives SONAR_TOKEN) so a retagged action can't exfiltrate the secret.
      #- uses: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history: SonarQube needs blame data for new-code periods.
          fetch-depth: 0

      #- uses: actions/setup-go@v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Go tests with coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      #- uses: actions/setup-node@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Frontend tests
        run: cd web && node --test

      - name: SonarQube scan
        #uses: sonarsource/sonarqube-scan-action@v6
        uses: sonarsource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
