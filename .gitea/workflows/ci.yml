# Release gate: the checks a change must pass before merge. Runs on push
# and pull requests. `make check` is the project's authoritative gate
# (go vet, staticcheck, go test, frontend build + tests, and the binary
# 30 MB / bundle 100 KB size gates); the race suite runs separately.
#
# The heavier suites are deliberately NOT here: `make integration` needs
# a built Ergo, and `make irctest` a python3-venv checkout — both are run
# locally before releases (and can move to a nightly/release workflow if
# that cost is ever wanted). This keeps per-push CI fast while still
# enforcing the size budgets and race safety that only ran locally.
name: ci

on:
  push:
  pull_request:

# Least privilege: this job only reads the repo (no releases, no PR writes).
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # NOTE: actions are on mutable major-version tags for readability. Before
      # relying on this in an untrusted-runner setting, pin each to a full commit
      # SHA (e.g. actions/checkout@<sha> # v4) so a retagged action can't change.
      #- uses: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      #- uses: actions/setup-go@v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      #- uses: actions/setup-node@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      # go vet, staticcheck, go test, frontend build + tests, and the
      # binary (30 MB) and bundle (100 KB gzipped) size gates.
      - name: make check
        run: make check

      - name: Race tests
        run: go test -race ./internal/...
