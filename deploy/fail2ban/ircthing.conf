# fail2ban filter for ircthing login abuse.
#
# Install:  /etc/fail2ban/filter.d/ircthing.conf
# Pairs with deploy/fail2ban/jail.local (backend = systemd).
#
# Matches ircthing's login log lines (emitted to stderr / the journal):
#   login: failed authentication from <IP> (user "...")
#   login: rate-limited from <IP>
#   login: failed password-change verification from <IP>
#
# The IP is ircthing's rate-limiter source key, which is the REAL client
# address only when the deployment sets behind_proxy=true and the reverse
# proxy appends the client to X-Forwarded-For (see the README). Otherwise
# it is the proxy's own address — fix the config before relying on this.

[Definition]

# <HOST> anchors immediately after "from ", before the space that begins
# " (user ...)" or end-of-line, so an attacker-controlled (and %q-escaped)
# username in the failed-auth line cannot shift the capture.
failregex = ^login: failed authentication from <HOST> \(
            ^login: rate-limited from <HOST>$
            ^login: failed password-change verification from <HOST>$

# A successful login is audited but is NOT a failure.
ignoreregex = ^login: authenticated from
