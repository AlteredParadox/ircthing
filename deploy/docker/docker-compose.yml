# Turnkey ircthing + Caddy (automatic HTTPS) stack.
#
# Quick start (from this directory):
#   cp .env.example .env               # set IRCTHING_DOMAIN + ACME email
#   cp config.example.json config.json # your networks + password_hash
#   docker compose up -d --build
#
# Caddy terminates TLS on 80/443 and reverse-proxies to ircthing over the
# private "internal" network. ircthing itself is NOT published to the host —
# the only way in is through Caddy — so behind_proxy=true in config.json is
# correct and required (Caddy appends the real client to X-Forwarded-For).
#
# fail2ban is intentionally NOT a service here: it belongs on the host, where
# it can touch the real firewall. See fail2ban-jail.local and the README.

services:
  ircthing:
    build:
      # Repo root — the Dockerfile lives there.
      context: ../..
      dockerfile: Dockerfile
      args:
        # Overridden by `make docker`; a plain compose build gets these literals.
        VERSION: ${IRCTHING_VERSION:-docker}
        REVISION: ${IRCTHING_REVISION:-}
    image: ircthing:local
    container_name: ircthing
    restart: unless-stopped
    # Stable identity in the journal so host fail2ban can match on it.
    logging:
      driver: journald
      options:
        tag: ircthing
    environment:
      # Keep the Go heap inside the project's 72 MB RSS target (parity with the
      # systemd unit); mem_limit below is the hard ceiling that OOM-kills a
      # runaway. Raise both together on a larger host.
      - GOMEMLIMIT=64MiB
    # Hardening: the app already runs as non-root uid 10001, needs no Linux
    # capabilities (binds 8067, writes only the data volume) and never
    # escalates. read_only root + a tmpfs /tmp leave nothing else writable.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev
    mem_limit: 128m
    pids_limit: 256
    volumes:
      - ./config.json:/etc/ircthing/config.json:ro
      - ircthing_data:/var/lib/ircthing
    networks:
      - internal
    # No `ports:` — reachable only via Caddy on the internal network.

  caddy:
    image: caddy:2-alpine
    container_name: ircthing-caddy
    restart: unless-stopped
    depends_on:
      - ircthing
    ports:
      # Bind IPv4 explicitly. Docker's default (no host IP) ALSO binds ::, but
      # the bridge is IPv4-only, so an IPv6 client would be relayed through the
      # userland proxy and arrive as the docker gateway address — masking the
      # real client and breaking per-source rate-limiting and fail2ban bans. To
      # serve real IPv6, enable ip6 on the bridge and re-verify source logging.
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "0.0.0.0:443:443/udp"   # HTTP/3 (QUIC)
    environment:
      - IRCTHING_DOMAIN=${IRCTHING_DOMAIN:?set IRCTHING_DOMAIN in .env}
      - ACME_EMAIL=${ACME_EMAIL:-}
    # Hardening. Caddy needs exactly one capability — binding privileged ports
    # 80/443 — and no privilege escalation; it writes certs to the /data volume.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # Read-only root: the official Caddy image runs as root with no USER, so a
    # compromise could otherwise rewrite the image filesystem until restart.
    # /data and /config are writable volumes; /tmp is a bounded tmpfs.
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev
    mem_limit: 128m
    pids_limit: 256
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # ACME certs + account key — persist this!
      - caddy_config:/config
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  ircthing_data:
  caddy_data:
  caddy_config:
