# SonarQube scanner configuration (scanned by CI on every push; see
# .gitea/workflows/sonarqube.yml). The standard Go layout: everything is
# a source, *_test.go and the frontend node tests are the test set.
sonar.projectKey=ircthing
sonar.projectName=ircthing
sonar.sourceEncoding=UTF-8
# The only Python here is the irctest controller (integration/irctest/),
# which runs on the system interpreter — Debian 13's 3.13.
sonar.python.version=3.13

sonar.sources=.
sonar.exclusions=**/*_test.go,web/test/**,web/dist/**,web/node_modules/**,design/**,.cache/**,deploy/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go,web/test/**

# Go coverage from `go test -coverprofile` (produced by the workflow).
# The integration package only runs under build tags and the frontend
# has no JS coverage report, so neither counts against the metric.
sonar.go.coverage.reportPaths=coverage.out
sonar.coverage.exclusions=integration/**,web/**

# Deliberate rule exceptions — each is a project-style decision, not an
# oversight:
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5
# e1/e2: table-driven tests are project policy (CLAUDE.md); cognitive
# complexity counts every table row and step assertion against the one
# test function, which is exactly the shape we want tests to have.
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=web/test/**
# e3: the \x01 control characters in these regexes ARE the CTCP protocol
# delimiters (ACTION parsing); removing them removes the feature.
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S6324
sonar.issue.ignore.multicriteria.e3.resourceKey=web/src/irc.js
# e4: the irctest controller ships a bcrypt hash of a throwaway test
# credential ("irctest") — a fixture, not a secret.
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e4.resourceKey=integration/irctest/**
# e5: message bodies are immutable once rendered — the lines and link
# segments inside one message never reorder, so positional keys are
# stable by construction (chat.jsx Body).
sonar.issue.ignore.multicriteria.e5.ruleKey=javascript:S6479
sonar.issue.ignore.multicriteria.e5.resourceKey=web/src/chat.jsx
