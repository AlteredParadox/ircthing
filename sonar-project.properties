# SonarQube scanner configuration (scanned by CI on every push and PR; see
# .github/workflows/sonarqube.yml). The standard Go layout: everything is
# a source, *_test.go and the frontend node tests are the test set.
#
# SonarQube Cloud requires sonar.organization, and namespaces the project
# key as <owner>_<repo>. Confirm both against the values SonarQube Cloud
# assigns when the project is imported (Administration -> Information), and
# correct them here if they differ.
sonar.organization=alteredparadox
sonar.projectKey=AlteredParadox_ircthing
sonar.projectName=ircthing
sonar.sourceEncoding=UTF-8
# The only Python here is the irctest controller (integration/irctest/),
# which runs on the system interpreter — Debian 13's 3.13.
sonar.python.version=3.13

sonar.sources=.
sonar.exclusions=**/*_test.go,web/test/**,web/dist/**,web/node_modules/**,design/**,.cache/**,deploy/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go,web/test/**

# Go coverage from `go test -coverprofile` (produced by the workflow).
# The integration package only runs under build tags and the frontend
# has no JS coverage report, so neither counts against the metric.
sonar.go.coverage.reportPaths=coverage.out
sonar.coverage.exclusions=integration/**,web/**

# Deliberate rule exceptions — each is a project-style decision, not an
# oversight:
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10,e11,e12,e13,e14
# e1/e2: table-driven tests are project policy (CLAUDE.md); cognitive
# complexity counts every table row and step assertion against the one
# test function, which is exactly the shape we want tests to have.
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=web/test/**
# e3: the \x01 control characters in these regexes ARE the CTCP protocol
# delimiters (ACTION parsing); removing them removes the feature.
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S6324
sonar.issue.ignore.multicriteria.e3.resourceKey=web/src/irc.js
# e4: the irctest controller ships a bcrypt hash of a throwaway test
# credential ("irctest") — a fixture, not a secret.
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e4.resourceKey=integration/irctest/**
# e5: message bodies are immutable once rendered — the lines and link
# segments inside one message never reorder, so positional keys are
# stable by construction (chat.jsx Body).
sonar.issue.ignore.multicriteria.e5.ruleKey=javascript:S6479
sonar.issue.ignore.multicriteria.e5.resourceKey=web/src/chat.jsx
# e6: the irctest controller ships a bcrypt hash of a throwaway test
# credential — same fixture as e4, flagged again by the secrets analyzer
# (a different rule); still a fixture, not a live secret.
sonar.issue.ignore.multicriteria.e6.ruleKey=secrets:S8215
sonar.issue.ignore.multicriteria.e6.resourceKey=integration/irctest/**
# e7: these are SQLite migrations, not PL/SQL. SonarCloud has no SQLite
# analyzer so it treats *.sql as PL/SQL and misfires (e.g. NullComparison
# on lines that already use IS NOT NULL) — hence the "Data Dictionary not
# configured" warning too. Drop all PL/SQL rules on our SQL.
sonar.issue.ignore.multicriteria.e7.ruleKey=plsql:*
sonar.issue.ignore.multicriteria.e7.resourceKey=**/*.sql
# e8: the special-purpose IP ranges in the SSRF allowlist are hardcoded by
# design — they ARE the RFC-defined blocklist (see specialPurposePrefixes).
sonar.issue.ignore.multicriteria.e8.ruleKey=go:S1313
sonar.issue.ignore.multicriteria.e8.resourceKey=internal/netguard/**
# e9: 10.64.0.2 is the placeholder WireGuard DNS shown in the network form,
# not a deployment address.
sonar.issue.ignore.multicriteria.e9.ruleKey=javascript:S1313
sonar.issue.ignore.multicriteria.e9.resourceKey=web/src/netform.jsx
# e10: the inline players render arbitrary user-posted audio/video; there
# is no caption track to supply for links other people paste.
sonar.issue.ignore.multicriteria.e10.ruleKey=javascript:S4084
sonar.issue.ignore.multicriteria.e10.resourceKey=web/src/preview.jsx
# e11: the flagged wget lives in a HEALTHCHECK (a runtime probe); ADD is a
# build-time instruction and cannot replace it.
sonar.issue.ignore.multicriteria.e11.ruleKey=docker:S7026
sonar.issue.ignore.multicriteria.e11.resourceKey=Dockerfile
# e12/e13: hub and manager store the lifecycle context for their long-lived
# per-network goroutines (the shutdown signal). Threading ctx through every
# method instead is exactly the concurrency-model churn CLAUDE.md forbids.
sonar.issue.ignore.multicriteria.e12.ruleKey=godre:S8242
sonar.issue.ignore.multicriteria.e12.resourceKey=internal/hub/**
sonar.issue.ignore.multicriteria.e13.ruleKey=godre:S8242
sonar.issue.ignore.multicriteria.e13.resourceKey=internal/irc/**
# e14: fetchThumb's inner resolver returns a documented tri-state — the
# object-URL string, the UNPREVIEWABLE string sentinel, or null — which is
# exactly the shape useThumb caches and branches on (see the comment above
# fetchThumb). Collapsing it to one type would break that contract.
sonar.issue.ignore.multicriteria.e14.ruleKey=javascript:S3800
sonar.issue.ignore.multicriteria.e14.resourceKey=web/src/preview.jsx
